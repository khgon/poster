<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>포스터</title>
<style>
body{
    margin:0;
    text-align:center;
    background:#000;
}
img{
    max-width:100%;
    height:auto;
}
</style>
</head>

<body>

<img id="posterImage" src="img/poster.jpg">

<script>

const params = new URLSearchParams(window.location.search);
const page = params.get('page');

const img = document.getElementById("posterImage");

if(page){
    img.src = "img/poster" + page + ".jpg";
}

</script>

</body>
</html>
